<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI前沿笔记 | 具身智能·世界模型·VLA</title>

    <!-- Open Graph: 控制微信分享卡片 -->
    <meta property="og:title" content="AI前沿笔记 | 具身智能·世界模型·VLA">
    <meta property="og:description" content="记录具身智能、世界模型、VLA、强化学习等前沿AI研究的思考与探索">
    <meta property="og:image" content="https://zero1018.github.io/wechat-test/assets/cover.jpg">
    <meta property="og:image:width" content="1392">
    <meta property="og:image:height" content="768">
    <meta property="og:url" content="https://zero1018.github.io/wechat-test">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="AI前沿笔记">

    <!-- Twitter Card (兼容) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI前沿笔记 | 具身智能·世界模型·VLA">
    <meta name="twitter:description" content="记录具身智能、世界模型、VLA、强化学习等前沿AI研究的思考与探索">
    <meta name="twitter:image" content="https://zero1018.github.io/wechat-test/assets/cover.jpg">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 音乐控制按钮 -->
    <div id="music-toggle" class="music-btn" title="音乐开关">
        <svg id="music-icon-play" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <svg id="music-icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
    </div>

    <!-- Hero 区域 -->
    <header class="hero" id="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">AI前沿笔记</h1>
            <p class="hero-subtitle">具身智能 · 世界模型 · VLA · 强化学习</p>
            <div class="hero-meta">
                <span class="hero-date">2025 · 持续更新</span>
            </div>
        </div>
        <div class="scroll-hint">
            <span>向下滑动</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </header>

    <!-- 博客内容区 -->
    <main class="content">
        <!-- 文章列表会由 JS 动态加载 -->
        <div id="posts-list" class="posts-list"></div>
    </main>

    <!-- 文章详情（点击后展开） -->
    <div id="post-detail" class="post-detail hidden">
        <div class="post-detail-inner">
            <button class="back-btn" id="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回列表
            </button>
            <article id="post-content" class="post-body"></article>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2025 AI前沿笔记 · 用 ❤️ 构建</p>
    </footer>

    <!-- 音乐（自动播放） -->
    <audio id="bgm" loop preload="auto">
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
